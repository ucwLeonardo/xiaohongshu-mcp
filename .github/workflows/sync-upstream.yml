name: Sync Upstream

# Check for upstream changes every 6 hours and on manual trigger
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/xpzouying/xiaohongshu-mcp.git
          git fetch upstream main

      - name: Check for upstream changes
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" = "0" ]; then
            echo "Already up to date with upstream"
          else
            echo "Upstream is $BEHIND commits ahead"
          fi

      - name: Attempt merge
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          if git merge upstream/main --no-edit; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            git merge --abort
          fi

      - name: Push clean merge
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.conflict == 'false'
        run: git push origin main

      - name: Create PR for conflicts
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="sync-upstream-$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          git merge upstream/main --no-edit || true
          git add -A
          git commit -m "chore: sync upstream (conflicts need resolution)" || true
          git push origin "$BRANCH"

          CONFLICT_FILES=$(grep -rl '<<<<<<<' . --include='*.go' --include='Dockerfile' 2>/dev/null | tr '\n' ' ' || echo "unknown")

          gh pr create \
            --title "chore: sync upstream ($(date +%Y-%m-%d))" \
            --body "## Upstream Sync

          Upstream has new commits that conflict with our modifications.

          **Conflicts in:** ${CONFLICT_FILES}

          **Our modified files:**
          - \`browser/browser.go\` — Chrome 132+ headless fix
          - \`Dockerfile\` — Chrome auto-update disabled
          - \`service.go\` — error handling improvements

          Resolve conflicts, then rebuild Docker image locally."

  build-test:
    needs: sync
    if: needs.sync.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Go build
        run: go build -o /tmp/app .

      - name: Docker build
        run: docker build -t xiaohongshu-mcp:test .
